  <text x="0"    y="-207" text-anchor="middle" font-size="11.5" fill="#9ba3bc">duration</text>
  <text x="192"  y="-104" text-anchor="start"  font-size="11.5" fill="#9ba3bc">src_bytes</text>
  <text x="192"  y="-91"  text-anchor="start"  font-size="10"   fill="#484f64">(÷100)</text>
  <text x="192"  y="104"  text-anchor="start"  font-size="11.5" fill="#9ba3bc">logged_in</text>
