<!-- THESIS INSIGHT -->
<line x1="36" y1="962" x2="684" y2="962" stroke="rgba(255,255,255,0.08)" stroke-width="0.75"/>
<rect x="36" y="972" width="3" height="68" rx="1" fill="#2a78d6"/>
<text x="48" y="985"  font-size="9.5" fill="#7bb8f0" letter-spacing="1.5">THESIS CONNECTION</text>
<text x="48" y="1001" font-size="11.5" fill="#8b91a8">DoS and port scan share dst_host_count = 511 — the only separator is serror_rate. Your Week 6 classifier</text>
<text x="48" y="1017" font-size="11.5" fill="#8b91a8">will confuse these two classes most. SSH brute force is hardest: real bytes sent, no SYN errors, low</text>
<text x="48" y="1033" font-size="11.5" fill="#8b91a8">dst_host_count — it looks close to normal traffic. Both observations appear in the confusion matrix.</text>

