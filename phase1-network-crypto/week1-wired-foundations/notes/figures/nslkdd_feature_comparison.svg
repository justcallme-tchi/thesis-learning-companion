<!-- FEATURE CARDS -->
<line x1="36" y1="524" x2="684" y2="524" stroke="rgba(255,255,255,0.08)" stroke-width="0.75"/>
<text x="36" y="543" font-size="10" fill="#484f64" letter-spacing="1.5">FEATURE REFERENCE</text>

<rect x="36"  y="554" width="204" height="66" rx="6" fill="none" stroke="rgba(255,255,255,0.09)" stroke-width="0.75"/>
<text x="48"  y="571" font-size="10"   fill="#484f64" letter-spacing="0.5">duration</text>
<text x="48"  y="585" font-size="11.5" fill="#8b91a8">Connection lifetime in seconds.</text>
<text x="48"  y="600" font-size="11.5" fill="#8b91a8">SSH brute force lingers; DoS/scan</text>
<text x="48"  y="614" font-size="11.5" fill="#8b91a8">connections never complete.</text>

<rect x="252" y="554" width="204" height="66" rx="6" fill="none" stroke="rgba(255,255,255,0.09)" stroke-width="0.75"/>
<text x="264" y="571" font-size="10"   fill="#484f64" letter-spacing="0.5">src_bytes</text>
<text x="264" y="585" font-size="11.5" fill="#8b91a8">Bytes sent from source. Zero =</text>
<text x="264" y="600" font-size="11.5" fill="#8b91a8">SYN only, TCP handshake never</text>
<text x="264" y="614" font-size="11.5" fill="#8b91a8">finished, no data exchanged.</text>

<rect x="468" y="554" width="204" height="66" rx="6" fill="none" stroke="rgba(255,255,255,0.09)" stroke-width="0.75"/>
<text x="480" y="571" font-size="10"   fill="#484f64" letter-spacing="0.5">logged_in</text>
<text x="480" y="585" font-size="11.5" fill="#8b91a8">Auth succeeded (1=yes, 0=no).</text>
<text x="480" y="600" font-size="11.5" fill="#8b91a8">Only normal HTTP authenticates</text>
<text x="480" y="614" font-size="11.5" fill="#8b91a8">— all attack classes stay at 0.</text>

<rect x="36"  y="630" width="204" height="66" rx="6" fill="none" stroke="rgba(255,255,255,0.09)" stroke-width="0.75"/>
<text x="48"  y="647" font-size="10"   fill="#484f64" letter-spacing="0.5">serror_rate</text>
<text x="48"  y="661" font-size="11.5" fill="#8b91a8">Fraction of connections failing</text>
<text x="48"  y="676" font-size="11.5" fill="#8b91a8">at SYN stage. 1.0 = 100% SYN</text>
<text x="48"  y="690" font-size="11.5" fill="#8b91a8">errors = active SYN flood.</text>

<rect x="252" y="630" width="204" height="66" rx="6" fill="none" stroke="rgba(255,255,255,0.09)" stroke-width="0.75"/>
<text x="264" y="647" font-size="10"   fill="#484f64" letter-spacing="0.5">dst_host_count</text>
<text x="264" y="661" font-size="11.5" fill="#8b91a8">Recent connections to this host.</text>
<text x="264" y="676" font-size="11.5" fill="#8b91a8">511 = counter saturated = host</text>
<text x="264" y="690" font-size="11.5" fill="#8b91a8">under sustained attack.</text>

<rect x="468" y="630" width="204" height="66" rx="6" fill="none" stroke="rgba(255,255,255,0.09)" stroke-width="0.75"/>
<text x="480" y="647" font-size="10"   fill="#484f64" letter-spacing="0.5">protocol_type</text>
<text x="480" y="661" font-size="11.5" fill="#8b91a8">Label-encoded integer. 0=ICMP,</text>
<text x="480" y="676" font-size="11.5" fill="#8b91a8">1=TCP, 2=UDP. All four classes</text>
<text x="480" y="690" font-size="11.5" fill="#8b91a8">here use TCP (value = 1).</text>

