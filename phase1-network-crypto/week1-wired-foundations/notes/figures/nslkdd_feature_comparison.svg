<svg viewBox="0 0 720 1080" xmlns="http://www.w3.org/2000/svg" role="img"
     font-family="'JetBrains Mono','Fira Code','Courier New',monospace">
<title>NSL-KDD feature fingerprints — traffic class comparison</title>
<desc>Complete comparison of Normal HTTP, DoS SYN flood, Port scan, and SSH brute force across six NSL-KDD features. Includes radar chart, feature description cards, raw value table, and thesis connection note.</desc>

<!-- HEADER -->
<text x="36" y="34" font-size="10" fill="#484f64" letter-spacing="1.8">NSL-KDD · FEATURE ANALYSIS · WEEK 1</text>
<text x="36" y="58" font-size="18" font-weight="600" fill="#e6eaf2" letter-spacing="-0.5">Traffic fingerprints</text>
<text x="36" y="78" font-size="13" fill="#8b91a8">6 features · 4 traffic classes · how the model sees attack patterns</text>
<line x1="36" y1="90" x2="684" y2="90" stroke="rgba(255,255,255,0.08)" stroke-width="0.75"/>

